name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l *.go)"

      - name: Run tests
        run: |
          go test *.go
